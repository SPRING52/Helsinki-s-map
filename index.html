<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Интерактивная карта ЙО</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      defer
    ></script>
    <script src="script.js" defer></script>
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <header class="sidebar-header">
          <p class="kicker">Интерактивная Карта Хельсинки</p>
          <h1>Что тут есть для посищения</h1>
          <p class="subtitle">Ищем, фильтруем и исследуем.</p>
        </header>

        <section class="controls">
          <label for="searchInput">Искать</label>
          <input
            id="searchInput"
            type="search"
            placeholder="Попробуй: Сауна, еда, библиотека..."
          />

          <p class="control-label">Категории</p>
          <div id="categoryChips" class="category-chips" role="tablist"></div>
        </section>

        <section class="list-section">
          <div class="list-topline">
            <h2>Локации</h2>
            <span id="resultsCount">0</span>
          </div>
          <div id="locationList" class="location-list"></div>
        </section>
      </aside>

      <main class="map-pane">
        <div id="map" aria-label="Map of Helsinki locations"></div>
      </main>
    </div>
  </body>
</html>
