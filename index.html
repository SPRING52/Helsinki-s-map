<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Interactive map of Helsinki points with search, filters, and custom point creation."
    />
    <title>Карта Хельскинки</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      defer
    ></script>
    <script src="script.js" defer></script>
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <header class="sidebar-header">
          <p class="kicker">Черновой вариант карты Хельсинки</p>
          <h1>Исследуйте город</h1>
          <p class="subtitle">
            Ищите, фильтруйте и добавляйте свои собственные точки.
          </p>
        </header>

        <section class="controls">
          <label for="searchInput">Искать</label>
          <input
            id="searchInput"
            type="search"
            placeholder="Попробуйте: баня, рынок, библиотека..."
          />

          <p class="control-label">Категории</p>
          <div id="categoryChips" class="category-chips" role="tablist"></div>
        </section>

        <section class="list-section" id="locationSection">
          <div class="list-topline">
            <h2>Локации</h2>
            <span id="resultsCount">0</span>
          </div>
          <div id="locationList" class="location-list"></div>
        </section>

        <section class="form-section" id="formSection">
          <h2>Добавить новую точну</h2>
          <form id="pointForm" class="point-form" novalidate>
            <label for="pointName">Имя</label>
            <input
              id="pointName"
              name="name"
              type="text"
              maxlength="90"
              required
              placeholder="Имя точки"
            />

            <label for="pointDescription">Описание</label>
            <textarea
              id="pointDescription"
              name="description"
              maxlength="220"
              rows="3"
              required
              placeholder="Небольшое описание"
            ></textarea>

            <div class="coords-row">
              <div>
                <label for="pointLat">Широта</label>
                <input
                  id="pointLat"
                  name="latitude"
                  type="number"
                  step="0.00001"
                  required
                  placeholder="60.17000"
                />
              </div>
              <div>
                <label for="pointLng">Долгота</label>
                <input
                  id="pointLng"
                  name="longitude"
                  type="number"
                  step="0.00001"
                  required
                  placeholder="24.94000"
                />
              </div>
            </div>

            <button
              id="pickCoordsButton"
              class="secondary-button"
              type="button"
              aria-pressed="false"
            >
              Выбрать место на карте
            </button>

            <label for="pointCategory">Категория (Желательно)</label>
            <input
              id="pointCategory"
              name="category"
              type="text"
              maxlength="40"
              placeholder="Например: Магазин, красивый вид и т.п..."
            />

            <p id="formFeedback" class="form-feedback" aria-live="polite"></p>
            <button class="primary-button" type="submit">Создать точку</button>
          </form>
        </section>
      </aside>

      <main class="map-pane">
        <div id="map" aria-label="Map of Helsinki locations"></div>
      </main>
    </div>
  </body>
</html>
